<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>46 Anarchy Launcher</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=settings" />
    
</head>
<body>
    <header>
        <div class="status">
            <h2>loading...</h2>
        </div>
    </header>
    <h1>Welcome to the 46 Anarchy launcher</h1>
    <p>It's a community launcher not an official.</p>
    <div class="action">
        <div class="player">
            <button>
                <span class="player-head">
                    <img src="account.png" alt="player-head">
                </span>
            </button>
        </div>
        <div class="main-button">
            <button>
                <p>Launch</p>
            </button>
        </div>
        <div class="settings">
            <button>
                <img src="settings.png" alt="settings">
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>Settings</h2>

            <h3>Accounts</h3>
            <div class="account-list" id="accountList"></div>
            <button class="btn-add-account" id="btnAddAccount">+ Add Microsoft account</button>

            <h3>Memory</h3>
            <label>Min RAM (MB)</label>
            <input type="number" id="memMin" min="512" max="8192">
            <label>Max RAM (MB)</label>
            <input type="number" id="memMax" min="512" max="16384">

            <div class="modal-buttons">
                <button class="modal-close">Close</button>
                <button class="modal-save">Save</button>
            </div>
        </div>
    </div>
</body>
<script>
async function loadPlayerHead() {
    const img = document.querySelector(".player-head img");

    try {
        const res = await fetch("settings.json");
        const settings = await res.json();

        const activePlayer = settings.players?.find(p => p.active);
        if (activePlayer?.pseudo) {
            img.src = `https://mc-heads.net/avatar/${activePlayer.pseudo}`;
            img.classList.add("loaded");
        }
    } catch {
        // pas de settings ou pseudo vide → garde account.png
    }
}

loadPlayerHead();

const SERVER_IP = "minecraft.tuturprdev.xyz";
const SERVER_PORT = 25566;

async function updateServerStatus() {
    const statusElement = document.querySelector(".status h2");

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);

        const response = await fetch(
            `https://api.mcsrvstat.us/3/${SERVER_IP}:${SERVER_PORT}`,
            { signal: controller.signal }
        );

        clearTimeout(timeout);

        const data = await response.json();

        if (data.online) {
            const playersOnline = data.players?.online ?? 0;
            const playersMax = data.players?.max ?? "?";

            statusElement.innerHTML =
                `Online (${playersOnline}/${playersMax})`;
        } else {
            statusElement.innerHTML = "Offline";
        }

    } catch (err) {
        console.error("Server timeout/error:", err);
        statusElement.innerHTML = "Offline";
    }
}

updateServerStatus();
setInterval(updateServerStatus, 15000);

async function updateButton() {
    const btn = document.querySelector(".main-button button p");
    if (window.electronAPI) {
        const status = await window.electronAPI.getStatus();
        btn.textContent = status.installed ? "Launch" : "Install";
        btn.dataset.installed = status.installed;
    }
}

updateButton();

if (window.electronAPI?.onGameStatus) {
    window.electronAPI.onGameStatus((status) => {
        const btn = document.querySelector(".main-button button");
        const p = btn.querySelector("p");
        if (status === 'playing') {
            p.textContent = "Playing";
            isGameRunning = true;
        } else if (status === 'offline') {
            p.textContent = "Launch";
            isGameRunning = false;
            btn.classList.remove("disabled");
        }
    });
}

async function renderAccounts() {
    const list = document.getElementById("accountList");
    if (!window.electronAPI) return;
    const settings = await window.electronAPI.getSettings();
    const players = settings.players || [];

    list.innerHTML = "";
    for (const p of players) {
        const div = document.createElement("div");
        div.className = "account-item" + (p.active ? " active" : "");

        const head = document.createElement("img");
        head.className = "account-head";
        head.src = p.pseudo ? `https://mc-heads.net/avatar/${p.pseudo}` : "account.png";

        const name = document.createElement("span");
        name.className = "account-name";
        name.textContent = p.pseudo || "Unknown";

        const actions = document.createElement("div");
        actions.className = "account-actions";

        if (!p.active) {
            const useBtn = document.createElement("button");
            useBtn.textContent = "Use";
            useBtn.addEventListener("click", async () => {
                await window.electronAPI.authSetActive(p.uuid);
                await Promise.all([renderAccounts(), loadPlayerHead(), updateButton()]);
            });
            actions.appendChild(useBtn);
        }

        if (p.token) {
            const logoutBtn = document.createElement("button");
            logoutBtn.textContent = "Logout";
            logoutBtn.addEventListener("click", async () => {
                await window.electronAPI.authLogout(p.uuid);
                await renderAccounts();
            });
            actions.appendChild(logoutBtn);
        }

        const removeBtn = document.createElement("button");
        removeBtn.textContent = "Remove";
        removeBtn.className = "btn-remove";
        removeBtn.addEventListener("click", async () => {
            await window.electronAPI.authRemove(p.uuid);
            await Promise.all([renderAccounts(), loadPlayerHead(), updateButton()]);
        });
        actions.appendChild(removeBtn);

        div.appendChild(head);
        div.appendChild(name);
        div.appendChild(actions);
        list.appendChild(div);
    }
}

document.querySelector(".player button").addEventListener("click", async () => {
    if (!window.electronAPI) return;
    const settings = await window.electronAPI.getSettings();
    const players = settings.players || [];
    if (players.length <= 1) return;

    const activeIdx = players.findIndex(p => p.active);
    const nextIdx = (activeIdx + 1) % players.length;
    await window.electronAPI.authSetActive(players[nextIdx].uuid);
    await Promise.all([loadPlayerHead(), updateButton()]);
});

document.querySelector(".settings button").addEventListener("click", async () => {
    const modal = document.getElementById("settingsModal");
    if (window.electronAPI) {
        const settings = await window.electronAPI.getSettings();
        document.getElementById("memMin").value = settings.memMin || "1024";
        document.getElementById("memMax").value = settings.memMax || "2048";
        await renderAccounts();
    }
    modal.classList.add("open");
});

document.getElementById("btnAddAccount").addEventListener("click", async () => {
    if (!window.electronAPI) return;
    const result = await window.electronAPI.authLogin();
    if (result.success) {
        await Promise.all([renderAccounts(), loadPlayerHead(), updateButton()]);
    } else {
        alert("Login failed: " + result.error);
    }
});

document.querySelector(".modal-close").addEventListener("click", () => {
    document.getElementById("settingsModal").classList.remove("open");
});

document.querySelector(".modal-save").addEventListener("click", async () => {
    const memMin = document.getElementById("memMin").value;
    const memMax = document.getElementById("memMax").value;
    if (window.electronAPI) {
        const settings = await window.electronAPI.getSettings();
        settings.memMin = memMin;
        settings.memMax = memMax;
        await window.electronAPI.saveSettings(settings);
    }
    document.getElementById("settingsModal").classList.remove("open");
});

let isGameRunning = false;

document.querySelector(".main-button button").addEventListener("click", async () => {
    if (!window.electronAPI) {
        alert("Electron API not available");
        return;
    }

    if (isGameRunning) return;

    const btn = document.querySelector(".main-button button");
    const p = btn.querySelector("p");
    const installed = p.dataset.installed === "true";

    if (installed) {
        isGameRunning = true;
        btn.classList.add("disabled");
        p.textContent = "Launching...";
        const result = await window.electronAPI.launch();
        if (result?.error) {
            isGameRunning = false;
            btn.classList.remove("disabled");
            p.textContent = "Launch";
            alert(result.error);
        }
    } else {
        isGameRunning = true;
        btn.classList.add("disabled");
        p.textContent = "Installing...";
        const result = await window.electronAPI.install();
        if (result?.success) {
            p.textContent = "Launch";
            p.dataset.installed = "true";
            isGameRunning = false;
            btn.classList.remove("disabled");
        } else {
            p.textContent = "Install";
            isGameRunning = false;
            btn.classList.remove("disabled");
            alert(result?.error || "Install failed");
        }
    }
});
</script>
</html>
